name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9.19
      uses: actions/setup-python@v5
      with:
        python-version: '3.9.19'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=utils --cov-report=xml
    
    - name: Upload coverage to Codecov (uploader)
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      run: |
        curl -Os https://uploader.codecov.io/latest/linux/codecov
        chmod +x codecov
        ./codecov -f coverage.xml -v || echo "Codecov upload failed, skipping"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9.19
      uses: actions/setup-python@v5
      with:
        python-version: '3.9.19'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy
    
    - name: Run flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,__pycache__,.git,.mypy_cache
    
    - name: Run black
      run: black --check --diff . --exclude venv
    
    - name: Run mypy
      run: mypy . --ignore-missing-imports --exclude venv

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9.19
      uses: actions/setup-python@v5
      with:
        python-version: '3.9.19'
    
    - name: Run security audit
      run: |
        pip install safety
        safety check
